            <h1>You want to join our movement?</h1>
            <p>Please fill out the form below to get in touch with us.</p>
            <form action="submit_enquiry.php" method="post">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="interest">I am interested in:</label>
                    <select id="interest" name="interest" required>
                        <option value="">Select an option</option>
                        <option value="service">Services</option>
                        <option value="partnership">Partnership</option>
                        <option value="donation">Donation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Your message*</label>
                    <textarea id="message" rows="5" name="message" required></textarea>
                </div>
                <button type="submit" class="btn btn-large">Submit<i class="fas fa-paper-plane"></i></button>
            </form>
